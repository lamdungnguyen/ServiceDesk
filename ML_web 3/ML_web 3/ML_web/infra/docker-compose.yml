services:
  mysql:
    image: mysql:8.4
    container_name: ml_web_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ml_web
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: ml_web_server
    env_file:
      - ../.env
    environment:
      - DB_HOST=mysql
      - ML_SERVICE_URL=http://ml-service:8000
    ports:
      - "8081:8081"
    volumes:
      - "../server:/app"
      - "/app/node_modules"
    command: npm run dev
    depends_on:
      - mysql
      - ml-service

  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: ml_web_ml_service
    ports:
      - "8000:8000"

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: ml_web_client
    ports:
      - "5173:5173"
    volumes:
      - "../client:/app"
      - "/app/node_modules"
    depends_on:
      - server

volumes:
  mysql_data:
